spring.application.name=demo-backend

# Database URL
spring.datasource.url=jdbc:postgresql://localhost:5432/maureen

# Database credentials
spring.datasource.username=maureen
spring.datasource.password=maureen123

# PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (if using Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect (optional in newer Spring Boot versions)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


